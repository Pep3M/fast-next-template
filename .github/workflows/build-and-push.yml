name: Build and Push Docker Image

# Este workflow automatiza la construcción y subida de la imagen Docker
# - Rama dev → imagen :dev → deploy a servidor de desarrollo
# - Rama main → imagen :latest y :production → deploy a servidor de producción

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub Actions

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fast-next-template

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Rama dev → tag "dev"
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # Rama main/master → tags "latest" y "production"
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production,enable={{is_default_branch}}
            # Tag con versión semántica para tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Tag con SHA del commit (incluye rama)
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://buildtime:buildtime@localhost:5432/buildtime
            NEXT_PUBLIC_BETTER_AUTH_URL=${{ secrets.NEXT_PUBLIC_BETTER_AUTH_URL || 'http://localhost:5023' }}

      - name: Generate build summary
        run: |
          echo "## 🐳 Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Deploy Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "On your production server, run:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker-compose -f docker-compose.prod.yml pull" >> $GITHUB_STEP_SUMMARY
          echo "docker-compose -f docker-compose.prod.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to Development Server
    needs: build-and-push
    runs-on: ubuntu-latest
    # Solo ejecutar deploy en push a rama dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Deploy via SSH to Development
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🚀 Starting deployment on DEVELOPMENT server: $(hostname)"

            # Verificar que el script de deploy existe
            if [ ! -f /opt/app/deploy-production.sh ]; then
              echo "❌ ERROR: Script /opt/app/deploy-production.sh no encontrado"
              exit 1
            fi

            # Ejecutar el script de deploy en modo desarrollo
            cd /opt/app
            chmod +x deploy-production.sh
            ./deploy-production.sh --env dev --skip-health-check

            echo "✅ Development deployment completed successfully"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Development Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The application has been deployed to the **development server**." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Development Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for error details." >> $GITHUB_STEP_SUMMARY
          fi

  deploy-production:
    name: Deploy to Production Server
    needs: build-and-push
    runs-on: ubuntu-latest
    # Solo ejecutar deploy en push a main/master (no en tags)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy via SSH to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_PROD }}
          username: ${{ secrets.SSH_USERNAME_PROD }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          port: ${{ secrets.SSH_PORT_PROD || 22 }}
          script: |
            echo "🚀 Starting deployment on PRODUCTION server: $(hostname)"

            # Verificar que el script de deploy existe
            if [ ! -f /opt/app/deploy-production.sh ]; then
              echo "❌ ERROR: Script /opt/app/deploy-production.sh no encontrado"
              exit 1
            fi

            # Ejecutar el script de deploy en modo producción
            cd /opt/app
            chmod +x deploy-production.sh
            ./deploy-production.sh --env prod --skip-health-check

            echo "✅ Production deployment completed successfully"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The application has been deployed to **production**." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Production Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for error details." >> $GITHUB_STEP_SUMMARY
          fi
